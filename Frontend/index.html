<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Pharmacy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>MediCare Pharmacy</h1>
    <nav>
        <a href="#">Home</a>
        <a href="#">Medicines</a>
        <a href="#">Contact</a>
    </nav>
</header>

<section class="hero">
    <h2>Your Trusted Online Pharmacy</h2>
    <p>Order medicines safely and quickly.</p>
</section>

<section class="search-section">
    <input type="text" id="searchBox" placeholder="Search Medicine...">
</section>

<section class="products">
    <div class="card" data-name="Paracetamol">
        <h3>Paracetamol</h3>
        <p>₹50</p>
        <button>Add to Cart</button>
    </div>

    <div class="card" data-name="Vitamin C">
        <h3>Vitamin C</h3>
        <p>₹120</p>
        <button>Add to Cart</button>
    </div>

    <div class="card" data-name="Cough Syrup">
        <h3>Cough Syrup</h3>
        <p>₹90</p>
        <button>Add to Cart</button>
    </div>
</section>

<script src="script.js"></script>
</body>
</html>
